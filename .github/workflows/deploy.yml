name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-api:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    needs: [check]  # CI must pass first
    if: false  # TODO: remove this line once Railway is wired up
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        uses: railwayapp/railway-github-action@v2
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}

  # To activate:
  # 1. Link Railway project: railway link (run locally)
  # 2. Add RAILWAY_TOKEN to GitHub repo secrets
  # 3. Remove the `if: false` line above
  # 4. Verify the 'check' job name in ci.yml matches the `needs` array
