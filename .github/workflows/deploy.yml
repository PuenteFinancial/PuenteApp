name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-api:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v7
      - name: Deploy to Railway
        uses: railwayapp/railway-github-action@v2
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
