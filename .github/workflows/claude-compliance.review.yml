name: Security and Compliance Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "apps/api/src/routes/**"
      - "apps/api/src/services/**"
      - "apps/api/src/plugins/audit.ts"
      - "**/consent/**"
      - "**/credit/**"
      - "**/*auth*"

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # so it can post findings as a comment
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }   # full history so it can diff against base
      # SHA-pinned: the floating v1 tag shipped a broken v1.0.175 on
      # 2026-07-15 (runs die in ~2s with is_error:true). This is v1.0.174,
      # the last known-good. Unpin once upstream fixes it.
      - uses: anthropics/claude-code-action@12531344451323133b0493233c759991ac61da12 # v1.0.174
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review the diff in this PR (against the base branch) using TWO subagents:
            1. The security-reviewer subagent.
            2. The compliance-reviewer subagent.
            Run each, then post a single PR comment with their findings grouped by
            agent. If both report no issues, post "✅ Security & compliance: no issues."