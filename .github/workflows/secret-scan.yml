name: Secret Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can diff the PR range

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for private repos on the paid plan.
          # The free tier covers public repos and scans the diff only.
          # If this repo is private, sign up at gitleaks.io and add the secret.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
