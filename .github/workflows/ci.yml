name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build web
        run: cd apps/web && npx next build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Audit dependencies
        # high severity vulns in Expo 56 build tooling (@xmldom/xmldom via @expo/plist) have no
        # fix without downgrading Expo SDK. Only block on critical runtime vulnerabilities.
        run: npm audit --audit-level=critical
