name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build web
        run: pnpm --filter @puente/web exec next build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Audit dependencies
        # high severity vulns in Expo 56 build tooling (@xmldom/xmldom via @expo/plist) have no
        # fix without downgrading Expo SDK. Only block on critical runtime vulnerabilities.
        run: pnpm audit --audit-level=critical
