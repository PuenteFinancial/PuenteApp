version: 2
updates:
  # Root workspace + all pnpm packages
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Denver
    rebase-strategy: auto
    open-pull-requests-limit: 5
    # Only propose versions published at least 3 days ago — pnpm's
    # minimumReleaseAge policy (24h) rejects anything fresher at install time
    cooldown:
      default-days: 3
    groups:
      # Batch minor/patch bumps into one PR per group to reduce noise
      expo:
        patterns: ["expo*", "@expo/*"]
      react-native:
        patterns: ["react-native*", "@react-native/*"]
      fastify:
        patterns: ["fastify*", "@fastify/*"]
      typescript-tooling:
        patterns: ["typescript", "@typescript-eslint/*", "eslint*"]
        update-types: ["minor", "patch"]
      misc:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # Expo SDK majors require manual migration (covers expo, expo-router,
      # expo-constants, etc. — companion packages jump majors with the SDK)
      - dependency-name: "expo*"
        update-types: ["version-update:semver-major"]
      # Pinned exactly by the Expo SDK; moves only via `npx expo install` during SDK upgrades
      - dependency-name: "react-native-screens"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Denver
    rebase-strategy: auto
    open-pull-requests-limit: 3
